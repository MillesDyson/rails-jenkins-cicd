# Ambiente de demonstração local: sobe a API (imagem de produção) + PostgreSQL.
# Uso:
#   echo "RAILS_MASTER_KEY=$(cat config/master.key)" > .env
#   docker compose up --build
#   curl localhost:3000/up        # health check
#   curl localhost:3000/articles  # lista de artigos
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      target: production
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_HOST: db
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: articles_api_production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
