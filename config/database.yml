# Configuração parametrizada por variáveis de ambiente.
# Funciona igual em dev local, docker-compose e no pipeline do Jenkins:
# basta injetar DATABASE_HOST / DATABASE_USERNAME / DATABASE_PASSWORD.
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "postgres") %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "articles_api_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME_TEST", "articles_api_test") %>

production:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "articles_api_production") %>
